<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>設定｜Milz2 Admin</title>
  <meta name="theme-color" content="#00327f" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="admin-body" data-admin-current="settings">
  <div class="admin-shell">
    <aside class="admin-sidebar">
  <a class="admin-logo" href="index.html">Milz2<small>Admin Console</small></a>
  <nav class="admin-menu">
    <a href="index.html" data-admin="dashboard">ダッシュボード</a>
    <a href="inquiries.html" data-admin="inquiries">お問い合わせ</a>
    <a href="articles.html" data-admin="articles">記事管理</a>
    <a href="users.html" data-admin="users">登録者管理</a>
    <a href="emails.html" data-admin="emails">一括メール</a>
    <div class="sep"></div>
    <a href="jobs.html" data-admin="jobs">求人管理</a>
    <a href="companies.html" data-admin="companies">企業管理</a>
    <a href="checklists.html" data-admin="checklists">チェックリスト</a>
    <a href="analytics.html" data-admin="analytics">分析</a>
    <a href="settings.html" data-admin="settings">設定</a>
    <a href="audit-log.html" data-admin="audit">操作ログ</a>
    <div class="sep"></div>
    <a href="../index.html">公開サイトへ</a>
  </nav>
  <div class="admin-side-note">管理画面は静的モックです。実運用時はSupabase等のDB、認証、メール配信APIと接続してください。</div>
</aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-title"><h1>設定</h1><p>Milz2 管理画面</p></div>
        <div class="admin-actions"><a class="btn btn-outline btn-mini" href="settings.html">設定</a><a class="btn btn-primary btn-mini" href="login.html">ログアウト</a><div class="admin-user"><span class="admin-avatar">A</span>Admin</div></div>
      </header>
      <div class="admin-content">
        <section class="admin-grid cols-2"><div class="admin-panel"><div class="admin-panel-head"><h2 class="admin-panel-title">サイト設定</h2></div><form class="admin-form"><label>サイト名<input value="Milz2"></label><label>管理通知メール<input value="admin@milz2.example"></label><label>公開ステータス<select><option>公開中</option><option>メンテナンス</option></select></label><button class="btn btn-primary" type="submit">保存する</button></form></div><div class="admin-panel"><div class="admin-panel-head"><h2 class="admin-panel-title">メール設定</h2></div><form class="admin-form"><label>送信者名<input value="Milz2編集部"></label><label>送信元メール<input value="info@milz2.example"></label><label>配信停止URL<input value="https://example.com/unsubscribe"></label><button class="btn btn-primary" type="submit">保存する</button></form></div></section>
      </div>
    </main>
  </div>
<script>
  const current = document.body.dataset.adminCurrent;
  document.querySelectorAll('[data-admin]').forEach(a => { if(a.dataset.admin === current) a.classList.add('active'); });
</script>
</body>
</html>
